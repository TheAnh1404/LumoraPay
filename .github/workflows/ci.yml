name: CI/CD

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:
    inputs:
      deploy_production:
        description: Deploy production after all checks pass
        required: true
        type: boolean
        default: false

jobs:
  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

  backend:
    name: Backend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/lumorapay?schema=public
      JWT_ACCESS_SECRET: ci-access-secret
      JWT_REFRESH_SECRET: ci-refresh-secret
      STELLAR_NETWORK: TESTNET
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: lumorapay
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Validate Prisma schema
        run: npx prisma validate

      - name: Apply migrations
        run: npx prisma migrate deploy

      - name: Typecheck
        run: npm run typecheck

      - name: Unit tests
        run: npm run test -- --runInBand

      - name: Build
        run: npm run build

  contracts:
    name: Soroban Contracts
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: contracts
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32v1-none

      - name: Format check
        run: cargo fmt --check

      - name: Contract tests
        run: cargo test --target-dir target-ci

  production-deploy:
    name: Production Deploy Gate
    runs-on: ubuntu-latest
    needs:
      - frontend
      - backend
      - contracts
    if: github.event_name == 'workflow_dispatch' && inputs.deploy_production == true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify required deployment secrets
        env:
          FRONTEND_DEPLOY_HOOK: ${{ secrets.FRONTEND_DEPLOY_HOOK }}
          BACKEND_DEPLOY_HOOK: ${{ secrets.BACKEND_DEPLOY_HOOK }}
          PRODUCTION_DATABASE_URL: ${{ secrets.PRODUCTION_DATABASE_URL }}
          INVOICE_REGISTRY_CONTRACT_ID: ${{ secrets.INVOICE_REGISTRY_CONTRACT_ID }}
          PAYMENT_ESCROW_CONTRACT_ID: ${{ secrets.PAYMENT_ESCROW_CONTRACT_ID }}
        run: |
          test -n "$FRONTEND_DEPLOY_HOOK"
          test -n "$BACKEND_DEPLOY_HOOK"
          test -n "$PRODUCTION_DATABASE_URL"
          test -n "$INVOICE_REGISTRY_CONTRACT_ID"
          test -n "$PAYMENT_ESCROW_CONTRACT_ID"

      - name: Trigger backend deployment
        run: curl -fsS -X POST "${{ secrets.BACKEND_DEPLOY_HOOK }}"

      - name: Trigger frontend deployment
        run: curl -fsS -X POST "${{ secrets.FRONTEND_DEPLOY_HOOK }}"
